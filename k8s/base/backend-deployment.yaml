apiVersion: apps/v1
kind: Deployment
metadata:
  name: antiadhd-backend
  labels:
    app.kubernetes.io/name: antiadhd-backend
    app.kubernetes.io/part-of: antiadhd
spec:
  replicas: 2
  # The on-prem cluster currently has one node and one replica. Recreate avoids
  # starting two Spring JVMs at once and exhausting CPU during a rollout.
  strategy:
    type: Recreate
    rollingUpdate: null
  selector:
    matchLabels:
      app.kubernetes.io/name: antiadhd-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: antiadhd-backend
        app.kubernetes.io/part-of: antiadhd
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: ghcr.io/YOUR_GITHUB_ID/antiadhd-backend:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: antiadhd-backend-config
            - secretRef:
                name: antiadhd-backend-secret
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 18
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 100
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 128Mi
