apiVersion: apps/v1
kind: Deployment
metadata:
  name: antiadhd-backend
  labels:
    app.kubernetes.io/name: antiadhd-backend
    app.kubernetes.io/part-of: antiadhd
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: antiadhd-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: antiadhd-backend
        app.kubernetes.io/part-of: antiadhd
    spec:
      containers:
        - name: backend
          image: ghcr.io/YOUR_GITHUB_ID/antiadhd-backend:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: antiadhd-backend-config
            - secretRef:
                name: antiadhd-backend-secret
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 18
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 100
