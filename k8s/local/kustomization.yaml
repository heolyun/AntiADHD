apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: antiadhd
resources:
  - ../base
  - postgres-deployment.yaml
  - postgres-service.yaml
images:
  - name: ghcr.io/YOUR_GITHUB_ID/antiadhd-backend
    newName: ghcr.io/YOUR_GITHUB_ID/antiadhd-backend
    newTag: 0.1.0
patches:
  - target:
      kind: ConfigMap
      name: antiadhd-backend-config
    patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: antiadhd-backend-config
      data:
        SPRING_PROFILES_ACTIVE: "local"
        SPRING_DATASOURCE_URL: "jdbc:postgresql://antiadhd-postgres:5432/antiadhd"
        JPA_DDL_AUTO: "update"
        CORS_ALLOWED_ORIGINS: "http://api.antiadhd.local,https://api.antiadhd.local,http://localhost:19006,http://localhost:8081,http://localhost:8082"
  - target:
      kind: Deployment
      name: antiadhd-backend
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: antiadhd-backend
      spec:
        replicas: 1
  - target:
      kind: Ingress
      name: antiadhd-backend
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: api.antiadhd.local
