apiVersion: apps/v1
kind: Deployment
metadata:
  name: antiadhd-postgres
  labels:
    app.kubernetes.io/name: antiadhd-postgres
    app.kubernetes.io/part-of: antiadhd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: antiadhd-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: antiadhd-postgres
        app.kubernetes.io/part-of: antiadhd
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: antiadhd
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: antiadhd-postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: antiadhd-postgres-secret
                  key: POSTGRES_PASSWORD
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          emptyDir: {}
