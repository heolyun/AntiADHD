apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-antiadhd
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: antiadhd-dashboard
    app.kubernetes.io/part-of: antiadhd
data:
  antiadhd-overview.json: |-
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [
                {"options": {"0": {"color": "red", "text": "DOWN"}, "1": {"color": "green", "text": "UP"}}, "type": "value"}
              ],
              "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}
            },
            "overrides": []
          },
          "gridPos": {"h": 5, "w": 4, "x": 0, "y": 0},
          "id": 1,
          "options": {"colorMode": "background", "graphMode": "none", "justifyMode": "center", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto", "wideLayout": true},
          "targets": [{"editorMode": "code", "expr": "max(up{service=\"antiadhd-backend\"})", "legendFormat": "Backend", "range": true, "refId": "A"}],
          "title": "Backend Status",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "unit": "reqps"}, "overrides": []},
          "gridPos": {"h": 5, "w": 5, "x": 4, "y": 0},
          "id": 2,
          "options": {"colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto", "wideLayout": true},
          "targets": [{"editorMode": "code", "expr": "sum(rate(http_server_requests_seconds_count{application=\"antiadhd-backend\"}[5m]))", "legendFormat": "requests/s", "range": true, "refId": "A"}],
          "title": "Request Rate",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 1}, {"color": "red", "value": 2}]}, "unit": "s"}, "overrides": []},
          "gridPos": {"h": 5, "w": 5, "x": 9, "y": 0},
          "id": 3,
          "options": {"colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto", "wideLayout": true},
          "targets": [{"editorMode": "code", "expr": "histogram_quantile(0.95, sum by (le) (rate(http_server_requests_seconds_bucket{application=\"antiadhd-backend\"}[5m])))", "legendFormat": "P95", "range": true, "refId": "A"}],
          "title": "P95 Response Time",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "max": 1, "min": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 0.01}, {"color": "red", "value": 0.05}]}, "unit": "percentunit"}, "overrides": []},
          "gridPos": {"h": 5, "w": 5, "x": 14, "y": 0},
          "id": 4,
          "options": {"colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto", "wideLayout": true},
          "targets": [{"editorMode": "code", "expr": "sum(rate(http_server_requests_seconds_count{application=\"antiadhd-backend\",status=~\"5..\"}[5m])) / clamp_min(sum(rate(http_server_requests_seconds_count{application=\"antiadhd-backend\"}[5m])), 0.000001)", "legendFormat": "5xx ratio", "range": true, "refId": "A"}],
          "title": "HTTP 5xx Ratio",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "max": 1, "min": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 0.7}, {"color": "red", "value": 0.85}]}, "unit": "percentunit"}, "overrides": []},
          "gridPos": {"h": 5, "w": 5, "x": 19, "y": 0},
          "id": 5,
          "options": {"minVizHeight": 75, "minVizWidth": 75, "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "showThresholdLabels": false, "showThresholdMarkers": true, "sizing": "auto"},
          "targets": [{"editorMode": "code", "expr": "sum(jvm_memory_used_bytes{application=\"antiadhd-backend\",area=\"heap\"}) / sum(jvm_memory_max_bytes{application=\"antiadhd-backend\",area=\"heap\"})", "legendFormat": "Heap", "range": true, "refId": "A"}],
          "title": "JVM Heap",
          "type": "gauge"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "custom": {"axisCenteredZero": false, "axisColorMode": "text", "axisLabel": "", "axisPlacement": "auto", "barAlignment": 0, "drawStyle": "line", "fillOpacity": 15, "gradientMode": "none", "hideFrom": {"legend": false, "tooltip": false, "viz": false}, "lineInterpolation": "linear", "lineWidth": 2, "pointSize": 5, "scaleDistribution": {"type": "linear"}, "showPoints": "never", "spanNulls": false, "stacking": {"group": "A", "mode": "none"}, "thresholdsStyle": {"mode": "off"}}, "unit": "short"}, "overrides": []},
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 5},
          "id": 6,
          "options": {"legend": {"calcs": ["lastNotNull", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true}, "tooltip": {"hideZeros": false, "mode": "multi", "sort": "desc"}},
          "targets": [
            {"editorMode": "code", "expr": "hikaricp_connections_active{application=\"antiadhd-backend\"}", "legendFormat": "active", "range": true, "refId": "A"},
            {"editorMode": "code", "expr": "hikaricp_connections_max{application=\"antiadhd-backend\"}", "legendFormat": "max", "range": true, "refId": "B"}
          ],
          "title": "Database Connection Pool",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "custom": {"axisCenteredZero": false, "axisColorMode": "text", "axisLabel": "", "axisPlacement": "auto", "barAlignment": 0, "drawStyle": "line", "fillOpacity": 15, "gradientMode": "none", "hideFrom": {"legend": false, "tooltip": false, "viz": false}, "lineInterpolation": "linear", "lineWidth": 2, "pointSize": 5, "scaleDistribution": {"type": "linear"}, "showPoints": "never", "spanNulls": false, "stacking": {"group": "A", "mode": "none"}, "thresholdsStyle": {"mode": "off"}}, "unit": "cores"}, "overrides": []},
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 5},
          "id": 7,
          "options": {"legend": {"calcs": ["lastNotNull", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true}, "tooltip": {"hideZeros": false, "mode": "multi", "sort": "desc"}},
          "targets": [{"editorMode": "code", "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"antiadhd\",pod=~\"antiadhd-backend-.*\",container=\"backend\"}[5m]))", "legendFormat": "{{pod}}", "range": true, "refId": "A"}],
          "title": "Backend Pod CPU",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "custom": {"axisCenteredZero": false, "axisColorMode": "text", "axisLabel": "", "axisPlacement": "auto", "barAlignment": 0, "drawStyle": "line", "fillOpacity": 15, "gradientMode": "none", "hideFrom": {"legend": false, "tooltip": false, "viz": false}, "lineInterpolation": "linear", "lineWidth": 2, "pointSize": 5, "scaleDistribution": {"type": "linear"}, "showPoints": "never", "spanNulls": false, "stacking": {"group": "A", "mode": "none"}, "thresholdsStyle": {"mode": "off"}}, "unit": "bytes"}, "overrides": []},
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 5},
          "id": 8,
          "options": {"legend": {"calcs": ["lastNotNull", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true}, "tooltip": {"hideZeros": false, "mode": "multi", "sort": "desc"}},
          "targets": [{"editorMode": "code", "expr": "sum by (pod) (container_memory_working_set_bytes{namespace=\"antiadhd\",pod=~\"antiadhd-backend-.*\",container=\"backend\"})", "legendFormat": "{{pod}}", "range": true, "refId": "A"}],
          "title": "Backend Pod Memory",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 1}, {"color": "red", "value": 10}]}}, "overrides": []},
          "gridPos": {"h": 5, "w": 6, "x": 0, "y": 13},
          "id": 9,
          "options": {"colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto", "wideLayout": true},
          "targets": [{"editorMode": "code", "expr": "max(antiadhd_ai_jobs_pending{application=\"antiadhd-ai-worker\"})", "legendFormat": "pending", "range": true, "refId": "A"}],
          "title": "AI Jobs Pending",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "unit": "short"}, "overrides": []},
          "gridPos": {"h": 5, "w": 9, "x": 6, "y": 13},
          "id": 10,
          "options": {"legend": {"calcs": ["lastNotNull"], "displayMode": "table", "placement": "bottom", "showLegend": true}, "tooltip": {"hideZeros": false, "mode": "multi", "sort": "desc"}},
          "targets": [
            {"editorMode": "code", "expr": "increase(antiadhd_ai_jobs_completed_total{application=\"antiadhd-ai-worker\"}[1h])", "legendFormat": "completed", "range": true, "refId": "A"},
            {"editorMode": "code", "expr": "increase(antiadhd_ai_jobs_retried_total{application=\"antiadhd-ai-worker\"}[1h])", "legendFormat": "retried", "range": true, "refId": "B"},
            {"editorMode": "code", "expr": "increase(antiadhd_ai_jobs_failed_total{application=\"antiadhd-ai-worker\"}[1h])", "legendFormat": "failed", "range": true, "refId": "C"}
          ],
          "title": "AI Job Outcomes (1h)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 30}, {"color": "red", "value": 60}]}, "unit": "s"}, "overrides": []},
          "gridPos": {"h": 5, "w": 9, "x": 15, "y": 13},
          "id": 11,
          "options": {"colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto", "wideLayout": true},
          "targets": [{"editorMode": "code", "expr": "histogram_quantile(0.95, sum by (le) (rate(antiadhd_ai_job_processing_duration_seconds_bucket{application=\"antiadhd-ai-worker\"}[15m])))", "legendFormat": "P95", "range": true, "refId": "A"}],
          "title": "AI Processing Time P95",
          "type": "stat"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 42,
      "tags": ["antiadhd", "spring-boot", "kubernetes"],
      "templating": {"list": []},
      "time": {"from": "now-15m", "to": "now"},
      "timepicker": {},
      "timezone": "browser",
      "title": "AntiADHD Overview",
      "uid": "antiadhd-overview",
      "version": 2
    }
