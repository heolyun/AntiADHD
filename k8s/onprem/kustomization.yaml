apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: antiadhd
resources:
  - ../base
  - postgres-service.yaml
  - postgres-statefulset.yaml
  - postgres-backup-pvc.yaml
  - postgres-backup-cronjob.yaml
images:
  - name: ghcr.io/YOUR_GITHUB_ID/antiadhd-backend
    newName: antiadhd-backend
    newTag: local
patches:
  - target:
      kind: ConfigMap
      name: antiadhd-backend-config
    patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: antiadhd-backend-config
      data:
        SPRING_PROFILES_ACTIVE: "prod"
        SPRING_DATASOURCE_URL: "jdbc:postgresql://antiadhd-postgres:5432/antiadhd"
        JPA_DDL_AUTO: "validate"
        FLYWAY_BASELINE_ON_MIGRATE: "true"
        CORS_ALLOWED_ORIGINS: "http://api.antiadhd.local"
  - target:
      kind: Deployment
      name: antiadhd-backend
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: antiadhd-backend
      spec:
        replicas: 1
  - target:
      kind: Ingress
      name: antiadhd-backend
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: api.antiadhd.local
