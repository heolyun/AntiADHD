apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: antiadhd
resources:
  - ../base
  - postgres-service.yaml
  - postgres-statefulset.yaml
  - postgres-backup-pvc.yaml
  - postgres-backup-cronjob.yaml
  - ai-worker-deployment.yaml
  - ai-worker-service.yaml
  - voice-jobs-pvc.yaml
images:
  - name: ghcr.io/YOUR_GITHUB_ID/antiadhd-backend
    newName: antiadhd-backend
    newTag: local
patches:
  - target:
      kind: ConfigMap
      name: antiadhd-backend-config
    patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: antiadhd-backend-config
      data:
        SPRING_PROFILES_ACTIVE: "prod"
        SPRING_DATASOURCE_URL: "jdbc:postgresql://antiadhd-postgres:5432/antiadhd"
        JPA_DDL_AUTO: "validate"
        FLYWAY_BASELINE_ON_MIGRATE: "true"
        CORS_ALLOWED_ORIGINS: "http://api.antiadhd.local,http://localhost:19006,http://localhost:8081,http://localhost:8082,http://127.0.0.1:19006,http://127.0.0.1:8081,http://127.0.0.1:8082"
  - target:
      kind: Deployment
      name: antiadhd-backend
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: antiadhd-backend
      spec:
        replicas: 1
        template:
          spec:
            securityContext:
              fsGroup: 100
            containers:
              - name: backend
                env:
                  - name: AI_VOICE_STORAGE_PATH
                    value: /var/lib/antiadhd/voice-jobs
                volumeMounts:
                  - name: voice-jobs
                    mountPath: /var/lib/antiadhd/voice-jobs
            volumes:
              - name: voice-jobs
                persistentVolumeClaim:
                  claimName: antiadhd-voice-jobs
  - target:
      kind: Ingress
      name: antiadhd-backend
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: api.antiadhd.local
      - op: add
        path: /spec/rules/-
        value:
          http:
            paths:
              - path: /
                pathType: Prefix
                backend:
                  service:
                    name: antiadhd-backend
                    port:
                      name: http
