name: Build Signed Android Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: App version name (for example 0.2.0)
        required: true
        default: 0.1.0

permissions:
  contents: read

concurrency:
  group: mobile-release
  cancel-in-progress: false

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      APP_VERSION: ${{ inputs.version }}
      APP_VERSION_CODE: ${{ github.run_number }}
      EXPO_PUBLIC_API_BASE_URL: ${{ vars.MOBILE_API_BASE_URL }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    defaults:
      run:
        working-directory: mobile-app
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mobile-app/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Validate release configuration
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$EXPO_PUBLIC_API_BASE_URL" || { echo "Repository variable MOBILE_API_BASE_URL is required."; exit 1; }
          test -n "$KEYSTORE_BASE64" || { echo "Secret ANDROID_KEYSTORE_BASE64 is required."; exit 1; }
          test -n "$ANDROID_KEYSTORE_PASSWORD" || { echo "Secret ANDROID_KEYSTORE_PASSWORD is required."; exit 1; }
          test -n "$ANDROID_KEY_ALIAS" || { echo "Secret ANDROID_KEY_ALIAS is required."; exit 1; }
          test -n "$ANDROID_KEY_PASSWORD" || { echo "Secret ANDROID_KEY_PASSWORD is required."; exit 1; }
          [[ "$APP_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "Version must use x.y.z format."; exit 1; }

      - name: Install locked dependencies
        run: npm ci

      - name: Test and type-check
        run: npm test && npm run typecheck

      - name: Generate Android project
        run: npx expo prebuild --platform android --clean --no-install

      - name: Restore release keystore
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p release-signing
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > release-signing/antiadhd-release.jks
          echo "ANDROID_KEYSTORE_FILE=$PWD/release-signing/antiadhd-release.jks" >> "$GITHUB_ENV"

      - name: Build signed APK and AAB
        run: cd android && ./gradlew assembleRelease bundleRelease

      - name: Upload installable APK
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: atiadhd-${{ inputs.version }}-apk
          path: mobile-app/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload Play Store bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: atiadhd-${{ inputs.version }}-aab
          path: mobile-app/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 30
