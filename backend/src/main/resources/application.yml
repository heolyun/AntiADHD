server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always

spring:
  application:
    name: antiadhd-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/antiadhd}
    username: ${SPRING_DATASOURCE_USERNAME:antiadhd}
    password: ${SPRING_DATASOURCE_PASSWORD:antiadhd}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-to-a-long-random-value-for-local}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
