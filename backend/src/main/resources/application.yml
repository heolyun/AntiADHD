server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always

spring:
  application:
    name: antiadhd-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  servlet:
    multipart:
      max-file-size: 6MB
      max-request-size: 7MB
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:false}
    baseline-version: 1

app:
  calendar:
    holiday-api-base-url: ${HOLIDAY_API_BASE_URL:https://date.nager.at}
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:2592000000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:19006,http://localhost:8081,http://localhost:8082,http://127.0.0.1:19006,http://127.0.0.1:8081,http://127.0.0.1:8082}
  ai:
    usage:
      daily-limit-per-user: ${AI_DAILY_LIMIT_PER_USER:10}
      reset-zone: ${AI_DAILY_LIMIT_RESET_ZONE:Asia/Seoul}
    worker:
      enabled: ${AI_WORKER_ENABLED:false}
      poll-delay-ms: ${AI_WORKER_POLL_DELAY_MS:2000}
      stale-after-seconds: ${AI_WORKER_STALE_AFTER_SECONDS:300}
      max-attempts: ${AI_WORKER_MAX_ATTEMPTS:3}
    openai:
      enabled: ${OPENAI_ENABLED:false}
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      model: ${OPENAI_MODEL:gpt-5.6-luna}
      transcription-model: ${OPENAI_TRANSCRIPTION_MODEL:gpt-4o-mini-transcribe}
      timeout-seconds: ${OPENAI_TIMEOUT_SECONDS:90}
    voice:
      storage-path: ${AI_VOICE_STORAGE_PATH:/tmp/antiadhd-voice}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
