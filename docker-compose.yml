services:
  postgres:
    image: postgres:16-alpine
    container_name: antiadhd-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-antiadhd}
      POSTGRES_USER: ${POSTGRES_USER:-antiadhd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-antiadhd}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-antiadhd} -d ${POSTGRES_DB:-antiadhd}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: antiadhd-backend:local
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: antiadhd-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      JAVA_OPTS: ${JAVA_OPTS:--XX:MaxRAMPercentage=75.0 -XX:+UseContainerSupport}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-antiadhd}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-antiadhd}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-antiadhd}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-to-a-long-random-value-for-prod}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS:-2592000000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:19006,http://localhost:8081,http://localhost:8082,http://127.0.0.1:19006,http://127.0.0.1:8081,http://127.0.0.1:8082}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres-data:
