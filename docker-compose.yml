services:
  postgres:
    image: postgres:16-alpine
    container_name: antiadhd-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-antiadhd}
      POSTGRES_USER: ${POSTGRES_USER:-antiadhd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-antiadhd}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-antiadhd} -d ${POSTGRES_DB:-antiadhd}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: antiadhd-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-antiadhd}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-antiadhd}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-antiadhd}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-to-a-long-random-value-for-prod}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api}
    container_name: antiadhd-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:80"

volumes:
  postgres-data:

